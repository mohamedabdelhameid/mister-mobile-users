<nav
  class="bg-[#0a0a0a] fixed w-full z-20 top-0 start-0 border-b border-white/5 font-['Tajawal',sans-serif]"
  dir="rtl"
>
  <div class="max-w-screen-xl flex items-center justify-between mx-auto px-4 py-3">
    <a routerLink="/" class="flex items-center gap-2">
      <img loading="lazy" src="./logo-removedbg.png" class="h-10" alt="LUXA Logo" />
      <span class="text-xl font-black text-[#D4AF37]">LUXA</span>
    </a>

    <ul class="hidden md:flex items-center gap-1">
      <li>
        <a
          routerLink="/home"
          routerLinkActive="!text-[#D4AF37]"
          class="px-3 py-2 rounded-lg text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-200"
        >
          الرئيسية
        </a>
      </li>
      <li>
        <a
          routerLink="/about"
          routerLinkActive="!text-[#D4AF37]"
          class="px-3 py-2 rounded-lg text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-200"
        >
          عن LUXA
        </a>
      </li>
      <li>
        <a
          routerLink="/mobiles"
          routerLinkActive="!text-[#D4AF37]"
          class="px-3 py-2 rounded-lg text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-200"
        >
          متجرنا
        </a>
      </li>
      <li>
        <a
          routerLink="/search-mobiles"
          routerLinkActive="!text-[#D4AF37]"
          class="px-3 py-2 rounded-lg text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-200"
        >
          بحث عن هاتف
        </a>
      </li>
      <li>
        <a
          routerLink="/contact-us"
          routerLinkActive="!text-[#D4AF37]"
          class="px-3 py-2 rounded-lg text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-200"
        >
          تواصل معنا
        </a>
      </li>
    </ul>

    <div class="flex items-center gap-2">
      @if (!isLoggedIn()) {
        <a
          routerLink="/login"
          class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-white/50 border border-white/8 hover:border-[#D4AF37]/40 hover:text-[#D4AF37] transition-all duration-200 cursor-pointer"
        >
          <i class="fa-solid fa-arrow-right-to-bracket text-sm"></i>
          <span class="hidden sm:inline">تسجيل دخول</span>
        </a>
      }

      @if (isLoggedIn()) {
        <a
          routerLink="/cart"
          class="relative flex items-center justify-center w-9 h-9 rounded-xl text-white/40 border border-white/8 hover:border-[#D4AF37]/40 hover:text-[#D4AF37] transition-all duration-200 cursor-pointer"
        >
          <i class="fa-solid fa-cart-shopping text-sm"></i>
          @if (countCart() > 0) {
            <span
              class="absolute -top-1.5 -left-1.5 w-4 h-4 flex items-center justify-center text-[9px] font-black text-black rounded-full"
              style="background: #d4af37"
            >
              {{ countCart() }}
            </span>
          }
        </a>

        <div class="relative">
          <button
            type="button"
            (click)="toggleDropdown()"
            class="flex items-center gap-2 px-3 py-2 rounded-xl border border-white/8 hover:border-[#D4AF37]/30 transition-all duration-200 cursor-pointer"
          >
            <div
              class="w-7 h-7 rounded-lg flex items-center justify-center text-black font-black text-xs"
              style="background: linear-gradient(135deg, #d4af37, #f0cc5c)"
            >
              <i class="fa-solid fa-user text-xs"></i>
            </div>
            <i
              class="fa-solid fa-chevron-down text-white/30 text-[10px] transition-transform duration-200"
              [class.rotate-180]="isDropdownOpen"
            ></i>
          </button>

          @if (isDropdownOpen) {
            <div
              class="absolute left-0 mt-2 w-48 bg-[#0f0f0f] border border-white/8 rounded-2xl overflow-hidden z-50"
              style="box-shadow: 0 0 40px rgba(0, 0, 0, 0.5)"
            >
              <div class="p-1.5 flex flex-col gap-0.5">
                <a
                  routerLink="/profile"
                  routerLinkActive="bg-[#D4AF37]/8 text-[#D4AF37]"
                  (click)="isDropdownOpen = false"
                  class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/50 hover:bg-white/5 hover:text-white transition-all duration-150 cursor-pointer"
                >
                  <i class="fa-solid fa-user text-xs text-[#D4AF37]/50 w-4"></i>
                  حسابي
                </a>

                <div class="h-px bg-white/5 my-1"></div>

                <button
                  (click)="signOut()"
                  class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-red-400/60 hover:bg-red-500/8 hover:text-red-400 transition-all duration-150 cursor-pointer w-full text-right"
                >
                  <i class="fa-solid fa-arrow-right-from-bracket text-xs w-4"></i>
                  تسجيل خروج
                </button>
              </div>
            </div>
          }
        </div>
      }

      <button
        type="button"
        (click)="toggleMenu()"
        class="md:hidden flex items-center justify-center w-9 h-9 rounded-xl border border-white/8 text-white/40 hover:border-[#D4AF37]/30 hover:text-[#D4AF37] transition-all duration-200 cursor-pointer"
      >
        <i
          class="text-sm transition-all duration-200"
          [ngClass]="isMenuOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars'"
        ></i>
      </button>
    </div>
  </div>

  @if (isMenuOpen) {
    <div class="md:hidden border-t border-white/5 bg-[#0a0a0a] px-4 py-3" dir="rtl">
      <ul class="flex flex-col gap-1">
        <li>
          <a
            routerLink="/home"
            routerLinkActive="text-[#D4AF37] bg-[#D4AF37]/5"
            (click)="isMenuOpen = false"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-150"
          >
            <i class="fa-solid fa-house text-xs text-[#D4AF37]/40 w-4"></i>الرئيسية
          </a>
        </li>
        <li>
          <a
            routerLink="/about"
            routerLinkActive="text-[#D4AF37] bg-[#D4AF37]/5"
            (click)="isMenuOpen = false"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-150"
          >
            <i class="fa-solid fa-circle-info text-xs text-[#D4AF37]/40 w-4"></i>عن LUXA
          </a>
        </li>
        <li>
          <a
            routerLink="/mobiles"
            routerLinkActive="text-[#D4AF37] bg-[#D4AF37]/5"
            (click)="isMenuOpen = false"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-150"
          >
            <i class="fa-solid fa-mobile-screen text-xs text-[#D4AF37]/40 w-4"></i>متجرنا
          </a>
        </li>
        <li>
          <a
            routerLink="/search-mobiles"
            routerLinkActive="text-[#D4AF37] bg-[#D4AF37]/5"
            (click)="isMenuOpen = false"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-150"
          >
            <i class="fa-solid fa-magnifying-glass text-xs text-[#D4AF37]/40 w-4"></i>بحث عن هاتف
          </a>
        </li>
        <li>
          <a
            routerLink="/contact-us"
            routerLinkActive="text-[#D4AF37] bg-[#D4AF37]/5"
            (click)="isMenuOpen = false"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-white/50 hover:text-white hover:bg-white/5 transition-all duration-150"
          >
            <i class="fa-solid fa-envelope text-xs text-[#D4AF37]/40 w-4"></i>تواصل معنا
          </a>
        </li>
      </ul>
    </div>
  }
</nav>
