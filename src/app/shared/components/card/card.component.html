<div
  class="relative bg-white/3 border border-white/5 rounded-2xl overflow-hidden w-full max-w-xs flex flex-col transition-all duration-300 hover:border-[#D4AF37]/25 group"
  style="box-shadow: 0 0 0 rgba(212, 175, 55, 0)"
>
  <div
    class="absolute top-3 left-3 z-10 flex items-center gap-1 bg-black/40 backdrop-blur-sm rounded-full px-2 py-1"
  >
    <span class="w-1.5 h-1.5 rounded-full bg-[#D4AF37] animate-pulse"></span>
    <span class="text-[#D4AF37] text-[10px] tracking-wide">{{ item()?.status }}</span>
  </div>

  <div
    class="relative bg-[#111] h-48 flex items-center justify-center cursor-pointer overflow-hidden"
    (click)="router.navigate(['mobiles', item()?.id])"
  >
    <div
      class="absolute inset-0 bg-gradient-to-br from-[#D4AF37]/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none"
    ></div>
    <img
      loading="lazy"
      [src]="'http://127.0.0.1:8000' + item()?.image_cover"
      [alt]="item()?.title"
      class="h-36 w-full object-contain p-4 transition-transform duration-500 group-hover:scale-105"
    />

    <div
      class="absolute top-2 right-2 w-4 h-4 border-t border-r border-[#D4AF37]/15 rounded-tr-sm group-hover:border-[#D4AF37]/40 transition-colors duration-300"
    ></div>
    <div
      class="absolute top-2 left-2 w-4 h-4 border-t border-l border-[#D4AF37]/15 rounded-tl-sm group-hover:border-[#D4AF37]/40 transition-colors duration-300"
    ></div>
    <div
      class="absolute bottom-2 right-2 w-4 h-4 border-b border-r border-[#D4AF37]/15 rounded-br-sm group-hover:border-[#D4AF37]/40 transition-colors duration-300"
    ></div>
    <div
      class="absolute bottom-2 left-2 w-4 h-4 border-b border-l border-[#D4AF37]/15 rounded-bl-sm group-hover:border-[#D4AF37]/40 transition-colors duration-300"
    ></div>
  </div>

  <div class="h-px bg-gradient-to-r from-transparent via-[#D4AF37]/10 to-transparent"></div>

  <div class="p-4 flex flex-col gap-3 flex-1">
    <p class="text-[#D4AF37]/50 text-[10px] tracking-widest uppercase">{{ item()?.brand?.name }}</p>

    <h2
      class="text-white font-bold text-base leading-snug line-clamp-2 cursor-pointer group-hover:text-[#D4AF37] transition-colors duration-200"
      (click)="router.navigate(['mobiles', item()?.id])"
    >
      {{ item()?.title }}
    </h2>

    <p class="text-white/30 text-xs">{{ item()?.storage }}</p>

    <div class="flex items-center justify-between mt-auto pt-1">
      <div class="flex items-baseline gap-1">
        <span class="text-[#D4AF37] font-black text-xl">{{ item()?.final_price }}</span>
        <span class="text-[#D4AF37]/50 text-xs">ج.م</span>
      </div>

      <button
        (click)="router.navigate(['mobiles', item()?.id])"
        class="relative flex items-center gap-2 px-4 py-2 rounded-xl font-bold text-xs overflow-hidden cursor-pointer group/btn transition-all duration-200"
        style="
          background: linear-gradient(135deg, #d4af37 0%, #f0cc5c 50%, #d4af37 100%);
          color: #0a0a0a;
        "
      >
        <span class="relative z-10 flex items-center gap-1.5"> عرض التفاصيل </span>
        <div
          class="absolute inset-0 opacity-0 group-hover/btn:opacity-100 transition-opacity duration-300"
          style="background: linear-gradient(135deg, #f0cc5c 0%, #d4af37 100%)"
        ></div>
      </button>
    </div>
  </div>
</div>
